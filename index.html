  `;
}

function logWeight() {
  const input = document.getElementById('weight-input');
  const val = parseFloat(input.value);
  if (!val || val < 20 || val > 300) return;

  const existing = data.weights.findIndex(w => w.date === today());
  if (existing >= 0) {
    data.weights[existing].weight = val;
  } else {
    data.weights.push({ date: today(), weight: val });
  }

  // Auto-adjust calories if enabled
  if (data.autoAdjust) {
    autoAdjustCalories();
  }

  save();
  renderDiet();
}

function toggleAutoAdjust() {
  data.autoAdjust = !data.autoAdjust;
  save();
  renderDiet();
}

function setManualCalories() {
  const input = document.getElementById('cal-override');
  const val = parseInt(input.value);
  if (!val || val < 1000 || val > 6000) return;
  data.targetCalories = val;
  data.autoAdjust = false;
  save();
  renderDiet();
}

function calculateTrend(periodDays) {
  if (data.weights.length < 2) return null;
  const sorted = [...data.weights].sort((a, b) => new Date(a.date) - new Date(b.date));

  // Custom date range mode
  const isCustom = !periodDays && dietTrendPeriod === 'custom' && dietCustomFrom && dietCustomTo;
  if (isCustom) {
    const pts = sorted.filter(w => w.date >= dietCustomFrom && w.date <= dietCustomTo);
    if (pts.length < 2) return null;
    const first = pts[0], last = pts[pts.length - 1];
    const daysBetween = (new Date(last.date + 'T12:00:00') - new Date(first.date + 'T12:00:00')) / 86400000;
    if (daysBetween < 2) return null;
    const weeklyRate = ((last.weight - first.weight) / daysBetween) * 7;
    const goal = DIET_GOALS[data.dietGoal] || DIET_GOALS['lean-bulk'];
    const [lo, hi] = goal.target;
    let label, status;
    if (weeklyRate >= lo && weeklyRate <= hi) { label = 'On target'; status = 'good'; }
    else if (weeklyRate > hi) { label = weeklyRate > 0 ? 'Gaining too fast' : 'Not cutting enough'; status = 'warning'; }
    else { label = weeklyRate < 0 ? 'Losing too fast' : 'Below target'; status = lo < 0 ? 'warning' : 'danger'; }
    return { weeklyRate, label, status, from: first.weight, to: last.weight, days: daysBetween, points: pts };
  }

  const days = periodDays || dietTrendPeriod || 7;
  const latest = sorted[sorted.length - 1];
  const latestDate = new Date(latest.date + 'T12:00:00');

  // Find entry closest to N days ago (or earliest if "all")
  let closest = null;
  if (days === 0) {
    closest = sorted[0];
  } else {
    const targetDate = new Date(latestDate);
    targetDate.setDate(targetDate.getDate() - days);
    let closestDiff = Infinity;
    for (const entry of sorted) {
      if (entry === latest) continue;
      const diff = Math.abs(new Date(entry.date + 'T12:00:00') - targetDate);
      if (diff < closestDiff) { closestDiff = diff; closest = entry; }
    }
  }

  if (!closest || closest === latest) return null;

  const daysBetween = (latestDate - new Date(closest.date + 'T12:00:00')) / (1000 * 60 * 60 * 24);
  if (daysBetween < 2) return null;

  const weeklyRate = ((latest.weight - closest.weight) / daysBetween) * 7;

  const goal = DIET_GOALS[data.dietGoal] || DIET_GOALS['lean-bulk'];
  const [lo, hi] = goal.target;
  let label, status;
  if (weeklyRate >= lo && weeklyRate <= hi) { label = 'On target'; status = 'good'; }
  else if (weeklyRate > hi) { label = weeklyRate > 0 ? 'Gaining too fast' : 'Not cutting enough'; status = 'warning'; }
  else { label = weeklyRate < 0 ? 'Losing too fast' : 'Below target'; status = lo < 0 ? 'warning' : 'danger'; }

  // Get data points for graph within the period
  const cutoff = days === 0 ? new Date(0) : new Date(latestDate.getTime() - days * 86400000);
  const points = sorted.filter(w => new Date(w.date + 'T12:00:00') >= cutoff);

  return { weeklyRate, label, status, from: closest.weight, to: latest.weight, days: daysBetween, points };
}

function setDietTrendPeriod(d) {
  dietTrendPeriod = d;
  if (d !== 'custom') { dietCustomFrom = ''; dietCustomTo = ''; }
  renderDiet();
}

function setCustomDateRange() {
  const fromEl = document.getElementById('trend-from');
  const toEl = document.getElementById('trend-to');
  if (!fromEl || !toEl || !fromEl.value || !toEl.value) return;
  dietCustomFrom = fromEl.value;
  dietCustomTo = toEl.value;
  if (dietCustomFrom > dietCustomTo) {
    [dietCustomFrom, dietCustomTo] = [dietCustomTo, dietCustomFrom];
  }
  renderDiet();
}

function buildWeightGraph(points) {
  if (!points || points.length < 2) return '';
  const pad = { top: 12, right: 8, bottom: 4, left: 8 };
  const W = 100, H = 100; // viewBox units
  const gw = W - pad.left - pad.right;
  const gh = H - pad.top - pad.bottom;

  const weights = points.map(p => p.weight);
  const minW = Math.min(...weights) - 0.3;
  const maxW = Math.max(...weights) + 0.3;
  const rangeW = maxW - minW || 1;

  const dates = points.map(p => new Date(p.date + 'T12:00:00').getTime());
  const minD = dates[0], maxD = dates[dates.length - 1];
  const rangeD = maxD - minD || 1;

  const coords = points.map((p, i) => ({
    x: pad.left + (dates[i] - minD) / rangeD * gw,
    y: pad.top + gh - ((p.weight - minW) / rangeW * gh)
  }));

  const linePath = coords.map((c, i) => `${i === 0 ? 'M' : 'L'}${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
  const areaPath = linePath + ` L${coords[coords.length-1].x.toFixed(1)},${(pad.top + gh).toFixed(1)} L${coords[0].x.toFixed(1)},${(pad.top + gh).toFixed(1)} Z`;

  // Grid lines at min, mid, max
  const midW = (minW + maxW) / 2;
  const yMin = pad.top;
  const yMid = pad.top + gh / 2;
  const yMax = pad.top + gh;

  const dots = coords.map(c => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="1.5" class="weight-graph-dot"/>`).join('');

  // Date labels
  const firstDate = new Date(points[0].date + 'T12:00:00');
  const lastDate = new Date(points[points.length - 1].date + 'T12:00:00');
  const fmtShort = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });

  return `
    <div class="weight-graph">
      <span class="weight-graph-y" style="top:${2}px">${maxW.toFixed(1)}</span>
      <span class="weight-graph-y" style="top:${60}px">${midW.toFixed(1)}</span>
      <span class="weight-graph-y" style="bottom:${6}px">${minW.toFixed(1)}</span>
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="graphGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="${pad.left}" y1="${yMin}" x2="${W - pad.right}" y2="${yMin}" class="weight-graph-gridline"/>
        <line x1="${pad.left}" y1="${yMid}" x2="${W - pad.right}" y2="${yMid}" class="weight-graph-gridline"/>
        <line x1="${pad.left}" y1="${yMax}" x2="${W - pad.right}" y2="${yMax}" class="weight-graph-gridline"/>
        <path d="${areaPath}" class="weight-graph-area"/>
        <path d="${linePath}" class="weight-graph-line"/>
        ${dots}
      </svg>
    </div>
    <div class="weight-graph-labels">
      <span>${fmtShort(firstDate)}</span>
      <span>${fmtShort(lastDate)}</span>
    </div>`;
}

function autoAdjustCalories() {
  const goal = DIET_GOALS[data.dietGoal] || DIET_GOALS['lean-bulk'];
  const [lo, hi] = goal.target;
  const step = goal.step;

  // Use 14-day trend when enough data exists (more reliable), else 7-day
  const sorted = [...data.weights].sort((a, b) => new Date(a.date) - new Date(b.date));
  const now = new Date();
  const twoWeeksAgo = new Date(now); twoWeeksAgo.setDate(twoWeeksAgo.getDate() - 14);
  const entriesIn14 = sorted.filter(w => new Date(w.date + 'T12:00:00') >= twoWeeksAgo);
  const useLong = entriesIn14.length >= 10;
  const periodDays = useLong ? 14 : 7;
  const periodLabel = useLong ? '2-week' : '7-day';

  const trend = calculateTrend(periodDays);
  if (!trend) { data.calorieRecommendation = null; save(); return; }

  let adj = 0;
  let status = 'good';
  let text = '';
  const rateStr = (trend.weeklyRate >= 0 ? '+' : '') + trend.weeklyRate.toFixed(2);
  const rangeStr = `${lo >= 0 ? '+' : ''}${lo} to ${hi >= 0 ? '+' : ''}${hi}`;

  if (trend.weeklyRate >= lo && trend.weeklyRate <= hi) {
    // On target
    status = 'good';
    text = `Your ${periodLabel} trend shows ${rateStr} kg/week. On track for ${goal.label.toLowerCase()} (${rangeStr} kg/week). No adjustment needed.`;
  } else if (trend.weeklyRate > hi) {
    // Above range — reduce
    const overshoot = trend.weeklyRate - hi;
    adj = -Math.min(Math.round(overshoot / 0.1) * 50, step * 2);
    adj = Math.round(adj / 50) * 50; // round to nearest 50
    if (Math.abs(adj) < 100) adj = -100; // minimum 100 kcal
    status = 'warning';
    text = `Your ${periodLabel} trend shows ${rateStr} kg/week. For ${goal.label.toLowerCase()} (${rangeStr} kg/week), reducing by ${Math.abs(adj)} kcal.`;
  } else {
    // Below range — increase
    const undershoot = lo - trend.weeklyRate;
    adj = Math.min(Math.round(undershoot / 0.1) * 50, step * 2);
    adj = Math.round(adj / 50) * 50; // round to nearest 50
    if (adj < 100) adj = 100; // minimum 100 kcal
    status = 'warning';
    text = `Your ${periodLabel} trend shows ${rateStr} kg/week. For ${goal.label.toLowerCase()} (${rangeStr} kg/week), increasing by ${adj} kcal.`;
  }

  if (adj !== 0) {
    data.targetCalories += adj;
    data.targetCalories = Math.max(1200, Math.min(6000, data.targetCalories));
  }

  data.calorieRecommendation = {
    text,
    date: today(),
    status,
    adjustment: adj !== 0 ? (adj > 0 ? `+${adj}` : `${adj}`) + ' kcal' : null,
    weeklyRate: trend.weeklyRate,
    periodLabel,
    usedLongTrend: useLong
  };
  save();
}

function setDietGoal(goal) {
  data.dietGoal = goal;
  data.calorieRecommendation = null;
  save();
  renderDiet();
}

/* ═══════════════════════════════════════════════════════════
   HISTORY
   ═══════════════════════════════════════════════════════════ */
function setHistoryPeriod(p) {
  historyPeriod = p;
  renderHistory();
}

function filterSessionsByPeriod(sessions) {
  if (historyPeriod === 'all') return sessions;
  const daysMap = { '1w': 7, '1m': 30, '3m': 90 };
  const cutoffDays = daysMap[historyPeriod] || 99999;
  return sessions.filter(s => daysAgo(s.date) <= cutoffDays);
}

function renderHistory() {
  const el = document.getElementById('history-content');

  if (data.sessions.length === 0 && data.weights.length === 0) {
    el.innerHTML = `
      <div class="empty-state fade-in">
        <div class="icon">◇</div>
        <p>Complete your first session to see your history here.</p>
      </div>`;
    return;
  }

  // Period selector
  const periodHtml = `
    <div class="period-selector fade-in">
      ${['1w','1m','3m','all'].map(p => `
        <button class="period-btn ${historyPeriod === p ? 'active' : ''}" onclick="setHistoryPeriod('${p}')">${p === 'all' ? 'All' : p.toUpperCase()}</button>
      `).join('')}
    </div>`;

  const filtered = filterSessionsByPeriod(data.sessions);

  // Stats
  const totalSessions = filtered.length;
  const todayDate = new Date();
  const dayOfWeek = todayDate.getDay();
  const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const monday = new Date(todayDate);
  monday.setDate(monday.getDate() - mondayOffset);
  monday.setHours(0, 0, 0, 0);
  const thisWeek = data.sessions.filter(s => new Date(s.date + 'T12:00:00') >= monday).length;

  // Body weight
  const bw = getCurrentBodyweight();
  const unit = weightLabel();
  let weightHtml = '';
  if (data.weights.length >= 2) {
    const sorted = [...data.weights].sort((a, b) => new Date(a.date) - new Date(b.date));
    const start = sorted[0].weight;
    const current = sorted[sorted.length - 1].weight;
    const change = current - start;
    const changeStr = (change >= 0 ? '+' : '') + displayWeight(change);
    weightHtml = `
      <div class="card fade-in stagger-2">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span class="label">Body Weight</span>
          <div class="unit-toggle">
            <button class="unit-opt ${data.weightUnit === 'kg' ? 'active' : ''}" onclick="setWeightUnit('kg')">kg</button>
            <button class="unit-opt ${data.weightUnit === 'lbs' ? 'active' : ''}" onclick="setWeightUnit('lbs')">lbs</button>
          </div>
        </div>
        <div class="stat-row mt-12">
          <div class="stat-box">
            <div class="stat-value" style="font-size:28px">${displayWeight(start)}</div>
            <div class="stat-label">Start (${unit})</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" style="font-size:28px">${displayWeight(current)}</div>
            <div class="stat-label">Current (${unit})</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" style="font-size:28px;color:${change >= 0 ? 'var(--accent)' : 'var(--danger)'}">${changeStr}</div>
            <div class="stat-label">Change (${unit})</div>
          </div>
        </div>
      </div>`;
  }

  // Exercise progress
  const progress = getExerciseProgress(filtered);
  let progressHtml = '';
  if (progress.length > 0) {
    progressHtml = `
      <div class="card fade-in stagger-3">
        <span class="label">Exercise Progress</span>
        <p class="text-xs text-dim mt-4">${historyPeriod === 'all' ? 'First session' : 'Period start'} vs most recent</p>
        <div class="mt-12">
          ${progress.map(p => {
            // Weight-based display if available
            const hasWeight = p.baselineWeight != null && p.currentWeight != null;
            let display, deltaStr, cls;
            if (hasWeight) {
              const wDelta = p.currentWeight - p.baselineWeight;
              deltaStr = (wDelta >= 0 ? '+' : '') + displayWeight(wDelta) + unit;
              display = `${displayWeight(p.baselineWeight)} → ${displayWeight(p.currentWeight)}`;
              cls = classifyProgress(wDelta, hasWeight);
            } else {
              deltaStr = (p.delta >= 0 ? '+' : '') + p.delta.toFixed(1);
              display = `${p.baseline.toFixed(0)} → ${p.current.toFixed(0)}`;
              cls = classifyProgress(p.delta, false);
            }
            // Strength badge
            const level = bw && p.currentWeight ? getStrengthLevel(p.name, p.currentWeight, bw) : null;
            const levelBadge = level ? `<span class="strength-badge ${level}">${level.substring(0,3).toUpperCase()}</span>` : '';
            return `
              <div class="progress-row">
                <span class="progress-name">${p.name}${levelBadge}</span>
                <span class="progress-reps">${display}</span>
                <span class="progress-delta ${cls}">${deltaStr}</span>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  // Session log
  let sessionLogHtml = '';
  if (filtered.length > 0) {
    const recent = [...filtered].reverse().slice(0, 20);
    sessionLogHtml = `
      <div class="card fade-in stagger-4">
        <span class="label">Session Log</span>
        <div class="mt-12">
          ${recent.map(s => {
            const tLabel = getTypeLabel(s.type);
            const exerciseSummary = s.exercises.map(e => {
              const reps = e.sets.map(set => getSetReps(set)).filter(r => r > 0);
              const w = e.sets.length > 0 ? getSetWeight(e.sets[0]) : null;
              const wStr = w ? ` @${displayWeight(w)}` : '';
              const avgRep = reps.length ? Math.round(reps.reduce((a,b)=>a+b,0)/reps.length) : 0;
              return `${e.name.split(' ')[0]} ${reps.length}×${avgRep}${wStr}`;
            }).join(', ');
            const deloadBadge = s.isDeload ? ' <span class="type-badge rp" style="font-size:8px">DL</span>' : '';
            return `
              <div class="session-entry">
                <div class="session-meta">
                  <span class="session-date">${formatDate(s.date)}</span>
                  <span class="session-type-badge">${tLabel}${deloadBadge}</span>
                </div>
                <div class="session-exercises">${exerciseSummary}</div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }

  el.innerHTML = `
    ${periodHtml}
    <div class="stat-row fade-in">
      <div class="stat-box">
        <div class="stat-value">${totalSessions}</div>
        <div class="stat-label">${historyPeriod === 'all' ? 'Total' : 'Period'} Sessions</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${thisWeek}</div>
        <div class="stat-label">This Week</div>
      </div>
    </div>
    ${weightHtml}
    ${progressHtml}
    ${sessionLogHtml}
  `;
}

function setWeightUnit(u) {
  data.weightUnit = u;
  save();
  renderHistory();
}

function classifyProgress(delta, isWeight) {
  if (delta < 0) return 'regression';
  if (delta === 0) return 'neutral';
  // For weight: >10kg fast, 2.5-10 ideal, <2.5 slow (over full period)
  // For reps: >5 fast, 1-5 ideal, <1 slow
  const threshold = isWeight ? { fast: 10, slow: 2.5 } : { fast: 5, slow: 1 };
  if (delta > threshold.fast) return 'too-fast';
  if (delta >= threshold.slow) return 'ideal';
  return 'too-slow';
}

function getExerciseProgress(sessions) {
  if (!sessions) sessions = data.sessions;
  if (sessions.length < 1) return [];

  const exercises = {};
  for (const session of sessions) {
    for (const ex of session.exercises) {
      if (!exercises[ex.name]) {
        exercises[ex.name] = { firstReps: null, lastReps: null, firstWeight: null, lastWeight: null };
      }
      const validSets = ex.sets.filter(s => !normalizeSet(s).skipped);
      if (validSets.length === 0) continue;
      const avgReps = validSets.map(s => getSetReps(s)).reduce((a, b) => a + b, 0) / validSets.length;
      const w = getSetWeight(validSets[0]);
      if (exercises[ex.name].firstReps === null) {
        exercises[ex.name].firstReps = avgReps;
        exercises[ex.name].firstWeight = w;
      }
      exercises[ex.name].lastReps = avgReps;
      exercises[ex.name].lastWeight = w;
    }
  }

  return Object.entries(exercises).map(([name, d]) => ({
    name,
    baseline: d.firstReps || 0,
    current: d.lastReps || 0,
    delta: (d.lastReps || 0) - (d.firstReps || 0),
    baselineWeight: d.firstWeight,
    currentWeight: d.lastWeight
  }));
}

/* ═══════════════════════════════════════════════════════════
   BUILD
   ═══════════════════════════════════════════════════════════ */
function ensureCustomPrograms() {
  if (!data.programs) {
    data.programs = {
      upper: PROGRAMS.upper.map(e => ({ ...e })),
      lower: PROGRAMS.lower.map(e => ({ ...e }))
    };
  }
  // Ensure all pattern types have a program
  for (const type of data.schedule.pattern) {
    if (!data.programs[type]) {
      data.programs[type] = [{ name: 'Exercise 1', sets: 3, reps: 10 }];
    }
  }
}

function renderBuild() {
  const el = document.getElementById('build-content');
  const programs = getPrograms();
  const pat = data.schedule.pattern;

  // Schedule card
  const dayNames = ['S','M','T','W','T','F','S'];
  const scheduleHtml = `
    <div class="card fade-in" style="margin-bottom:16px;">
      <span class="label">Training Schedule</span>
      <div class="schedule-days mt-12">
        ${dayNames.map((d, i) => `
          <button class="day-toggle ${data.schedule.trainingDays.includes(i) ? 'active' : ''}" onclick="toggleTrainingDay(${i})">${d}</button>
        `).join('')}
      </div>
      <div class="divider"></div>
      <span class="label">Split Rotation</span>
      <div class="split-chips mt-8">
        ${pat.map((p, i) => `
          <span class="split-chip ${i === data.schedule.patternIndex % pat.length ? 'current' : ''}">${getTypeLabel(p)}</span>
        `).join('')}
        <button class="split-chip split-add" onclick="addSplitDay()">+</button>
      </div>
      <p class="text-xs text-dim mt-8">Tap + to add a workout type. Long-press a chip to rename or remove.</p>
    </div>`;

  // Deload card
  const deloadHtml = `
    <div class="card fade-in" style="margin-bottom:16px;">
      <span class="label">Deload</span>
      <div class="type-selector mt-8">
        <button class="type-opt ${data.deload.mode === 'auto' ? 'active' : ''}" onclick="setDeloadMode('auto')">Auto</button>
        <button class="type-opt ${data.deload.mode === 'programmed' ? 'active' : ''}" onclick="setDeloadMode('programmed')">Every N wks</button>
        <button class="type-opt ${data.deload.mode === 'off' ? 'active' : ''}" onclick="setDeloadMode('off')">Off</button>
      </div>
      ${data.deload.mode === 'programmed' ? `
        <div class="mt-8" style="display:flex;align-items:center;gap:8px;">
          <span class="text-sm">Every</span>
          <input type="number" id="deload-interval" value="${data.deload.programmedInterval}" min="2" max="12" inputmode="numeric"
            style="width:50px;padding:6px 8px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;text-align:center;outline:none;"
            onchange="setDeloadInterval(this.value)">
          <span class="text-sm">weeks</span>
        </div>` : ''}
      ${data.deload.mode === 'auto' ? `<p class="text-xs text-dim mt-8">Recommends a deload when performance declines or after 6+ weeks.</p>` : ''}
    </div>`;

  // Program cards
  let programCards = '';
  for (const type of pat) {
    const prog = programs[type];
    if (prog) {
      programCards += renderBuildProgram(type, prog);
    }
  }
  // Also show any program types not in the pattern
  for (const type of Object.keys(programs)) {
    if (!pat.includes(type)) {
      programCards += renderBuildProgram(type, programs[type]);
    }
  }

  el.innerHTML = `
    ${scheduleHtml}
    ${deloadHtml}
    ${programCards}
    ${data.programs ? `
      <button class="btn btn-ghost mt-8 fade-in" onclick="resetPrograms()" style="color:var(--danger);">Reset to Defaults</button>
    ` : ''}
    <div class="card fade-in" style="margin-top:16px;">
      <span class="label">Data</span>
      <div class="data-actions mt-12">
        <button class="btn btn-ghost" onclick="exportData()" style="flex:1;">Export</button>
        <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()" style="flex:1;">Import</button>
        <button class="btn btn-ghost" onclick="shareData()" style="flex:1;">${navigator.share ? 'Share' : 'Copy'}</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
      <div class="divider"></div>
      <span class="label">Cloud Sync</span>
      ${data.syncBinId ? `
        <div class="sync-status">
          <span class="sync-dot connected"></span>
          <span>Auto-syncing to JSONBin</span>
          <span style="margin-left:auto;opacity:0.5;">${data.lastSyncTime ? new Date(data.lastSyncTime).toLocaleString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</span>
        </div>
        <div class="data-actions mt-8">
          <button class="btn btn-ghost" onclick="cloudPull()" style="flex:1;font-size:12px;">Pull from Cloud</button>
          <button class="btn btn-ghost" onclick="cloudPush()" style="flex:1;font-size:12px;">Push to Cloud</button>
        </div>
        <p class="text-xs text-dim mt-8">Bin ID: ${data.syncBinId.slice(0,8)}… · <a href="#" onclick="disconnectSync();return false;" style="color:var(--danger);">Disconnect</a></p>
      ` : `
        <div class="sync-status">
          <span class="sync-dot disconnected"></span>
          <span>Not connected</span>
        </div>
        <div class="sync-setup">
          <p class="text-xs text-dim mb-8">Free cloud backup. Get an API key from <a href="https://jsonbin.io" target="_blank" style="color:var(--accent);">jsonbin.io</a> (Access Keys → Create).</p>
          <input type="text" id="sync-api-key" placeholder="Paste your JSONBin Master Key" autocomplete="off">
          <button class="btn btn-ghost mt-8" onclick="setupSync()" style="width:100%;">New Backup</button>
          <div class="divider" style="margin:12px 0;"></div>
          <p class="text-xs text-dim mb-8">Restore from an existing backup:</p>
          <input type="text" id="sync-bin-id" placeholder="Paste your Bin ID" autocomplete="off">
          <button class="btn btn-ghost mt-8" onclick="restoreFromCloud()" style="width:100%;">Restore from Cloud</button>
        </div>
      `}
    </div>
  `;
}

function toggleTrainingDay(day) {
  const idx = data.schedule.trainingDays.indexOf(day);
  if (idx >= 0) {
    data.schedule.trainingDays.splice(idx, 1);
  } else {
    data.schedule.trainingDays.push(day);
    data.schedule.trainingDays.sort();
  }
  save();
  renderBuild();
}

function addSplitDay() {
  const name = prompt('Workout type name (e.g., Push, Pull, Legs, Full Body):');
  if (!name || !name.trim()) return;
  const key = name.trim().toLowerCase().replace(/\s+/g, '_');
  data.schedule.pattern.push(key);
  ensureCustomPrograms();
  if (!data.programs[key]) {
    data.programs[key] = [{ name: 'Exercise 1', sets: 3, reps: 10 }];
  }
  save();
  renderBuild();
}

function removeSplitDay(index) {
  if (data.schedule.pattern.length <= 1) return;
  data.schedule.pattern.splice(index, 1);
  if (data.schedule.patternIndex >= data.schedule.pattern.length) {
    data.schedule.patternIndex = 0;
  }
  data.nextType = data.schedule.pattern[data.schedule.patternIndex];
  save();
  renderBuild();
}

function setDeloadMode(mode) {
  data.deload.mode = mode;
  save();
  renderBuild();
}

function setDeloadInterval(val) {
  const n = parseInt(val);
  if (n >= 2 && n <= 12) {
    data.deload.programmedInterval = n;
    save();
  }
}

function renderBuildProgram(type, exercises) {
  const label = getTypeLabel(type);
  const totalSets = exercises.reduce((s, e) => s + e.sets, 0);

  let rows = exercises.map((ex, i) => {
    if (buildEditing && buildEditing.type === type && buildEditing.index === i) {
      return renderBuildEditForm(type, i, ex);
    }
    // Type badges
    let badge = '';
    if (ex.supersetNext) {
      badge = '<span class="type-badge ss">SS →</span>';
    } else if (i > 0 && exercises[i - 1].supersetNext) {
      badge = '<span class="type-badge ss">← SS</span>';
    }
    if (ex.restPause) {
      badge = '<span class="type-badge rp">RP</span>';
    }

    const w = ex.weight || getLastWeight(ex.name);
    const weightStr = w ? ` @ ${displayWeight(w)}${weightLabel()}` : '';

    return `
      <div class="build-exercise">
        <span class="ex-name">${ex.name} ${badge}</span>
        <span class="ex-detail">${ex.sets} × ${ex.reps}${weightStr}</span>
        <div class="build-actions">
          ${i > 0 ? `<button class="build-icon-btn" onclick="moveExercise('${type}', ${i}, -1)" title="Move up">↑</button>` : ''}
          ${i < exercises.length - 1 ? `<button class="build-icon-btn" onclick="moveExercise('${type}', ${i}, 1)" title="Move down">↓</button>` : ''}
          <button class="build-icon-btn" onclick="editExercise('${type}', ${i})" title="Edit">✎</button>
          <button class="build-icon-btn delete" onclick="deleteExercise('${type}', ${i})" title="Delete">×</button>
        </div>
      </div>`;
  }).join('');

  if (buildAdding === type) {
    rows += renderBuildEditForm(type, -1, { name: '', sets: 3, reps: 10 });
  }

  return `
    <div class="card build-program fade-in">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="display display-sm" style="margin-bottom:4px;">${label}</div>
        ${data.schedule.pattern.length > 1 ? `<button class="build-icon-btn delete" onclick="removeSplitDay(${data.schedule.pattern.indexOf(type)})" title="Remove" style="width:24px;height:24px;font-size:12px;">×</button>` : ''}
      </div>
      <span class="text-sm text-dim">${exercises.length} exercises · ${totalSets} sets</span>
      <div class="divider"></div>
      ${rows}
      ${buildAdding !== type ? `
        <button class="btn btn-secondary mt-12" onclick="addExercise('${type}')" style="font-size:16px;">+ Add Exercise</button>
      ` : ''}
    </div>`;
}

function renderBuildEditForm(type, index, ex) {
  const isNew = index === -1;
  const curType = buildEditType;
  const progs = getPrograms()[type];
  const isLast = !isNew && progs && index === progs.length - 1;
  const w = ex.weight || getLastWeight(ex.name) || '';
  const wDisplay = w ? displayWeight(w) : '';
  return `
    <div class="build-edit-form">
      <div class="field-row">
        <input type="text" id="edit-name" value="${isNew ? '' : ex.name}" placeholder="Exercise name">
      </div>
      <div class="field-row">
        <div style="flex:1">
          <div class="label" style="margin-bottom:4px;">Sets</div>
          <input type="number" id="edit-sets" value="${ex.sets}" min="1" max="10" inputmode="numeric" style="width:100%">
        </div>
        <div style="flex:1">
          <div class="label" style="margin-bottom:4px;">Reps</div>
          <input type="number" id="edit-reps" value="${ex.reps}" min="1" max="50" inputmode="numeric" style="width:100%">
        </div>
        <div style="flex:1">
          <div class="label" style="margin-bottom:4px;">Weight (${weightLabel()})</div>
          <input type="number" id="edit-weight" value="${wDisplay}" step="0.5" inputmode="decimal" placeholder="0" style="width:100%">
        </div>
      </div>
      <div style="margin-bottom:8px;">
        <div class="label" style="margin-bottom:4px;">Type</div>
        <div class="type-selector">
          <button class="type-opt ${curType === 'standard' ? 'active' : ''}" onclick="setBuildType('standard')">Standard</button>
          <button class="type-opt ${curType === 'superset' ? 'active' : ''}" onclick="setBuildType('superset')">Superset</button>
          <button class="type-opt ${curType === 'rest-pause' ? 'active' : ''}" onclick="setBuildType('rest-pause')">Rest-Pause</button>
        </div>
        ${curType === 'superset' ? `<p class="text-xs text-dim mt-8">Pairs with the next exercise — no rest between them.${isLast ? ' <span style="color:var(--warning)">Add the partner exercise below.</span>' : ''}</p>` : ''}
        ${curType === 'rest-pause' ? `<p class="text-xs text-dim mt-8">Main set → 5s → mini set → 5s → mini set. Three efforts per set.</p>` : ''}
      </div>
      <div style="margin-bottom:8px;">
        <div class="label" style="margin-bottom:4px;">Notes</div>
        <textarea id="edit-notes" placeholder="e.g., use narrow grip, pause at bottom">${ex.notes || ''}</textarea>
      </div>
      <div class="form-actions">
        <button class="cancel-btn" onclick="cancelBuildEdit()">Cancel</button>
        <button class="save-btn" onclick="saveBuildEdit('${type}', ${index})">${isNew ? 'Add' : 'Save'}</button>
      </div>
    </div>`;
}

function setBuildType(t) {
  // Preserve current form values before re-render
  const name = document.getElementById('edit-name')?.value;
  const sets = document.getElementById('edit-sets')?.value;
  const reps = document.getElementById('edit-reps')?.value;
  const weight = document.getElementById('edit-weight')?.value;
  const notes = document.getElementById('edit-notes')?.value;
  buildEditType = t;
  renderBuild();
  // Restore form values after re-render
  if (name !== undefined) {
    const n = document.getElementById('edit-name'); if (n) n.value = name;
    const s = document.getElementById('edit-sets'); if (s) s.value = sets;
    const r = document.getElementById('edit-reps'); if (r) r.value = reps;
    const w = document.getElementById('edit-weight'); if (w) w.value = weight;
    const nt = document.getElementById('edit-notes'); if (nt) nt.value = notes;
  }
}

function editExercise(type, index) {
  const progs = getPrograms();
  if (!progs[type] || !progs[type][index]) return;
  const ex = progs[type][index];
  buildEditType = ex.supersetNext ? 'superset' : ex.restPause ? 'rest-pause' : 'standard';
  buildEditing = { type, index };
  buildAdding = null;
  renderBuild();
  setTimeout(() => { const el = document.getElementById('edit-name'); if (el) el.focus(); }, 50);
}

function addExercise(type) {
  buildEditType = 'standard';
  buildAdding = type;
  buildEditing = null;
  renderBuild();
  setTimeout(() => { const el = document.getElementById('edit-name'); if (el) el.focus(); }, 50);
}

function cancelBuildEdit() {
  buildEditing = null;
  buildAdding = null;
  renderBuild();
}

function saveBuildEdit(type, index) {
  const name = document.getElementById('edit-name').value.trim();
  const sets = parseInt(document.getElementById('edit-sets').value);
  const reps = parseInt(document.getElementById('edit-reps').value);
  const weightVal = document.getElementById('edit-weight').value;
  const notes = document.getElementById('edit-notes').value.trim();

  if (!name || !sets || sets < 1 || !reps || reps < 1) return;

  ensureCustomPrograms();

  const exercise = { name, sets, reps };
  if (weightVal) {
    exercise.weight = parseWeightInput(weightVal);
  }
  if (notes) exercise.notes = notes;
  if (buildEditType === 'superset') exercise.supersetNext = true;
  if (buildEditType === 'rest-pause') exercise.restPause = true;

  if (!data.programs[type]) {
    data.programs[type] = [];
  }

  if (index === -1) {
    data.programs[type].push(exercise);
  } else {
    data.programs[type][index] = exercise;
  }

  buildEditing = null;
  buildAdding = null;
  save();
  renderBuild();
}

function deleteExercise(type, index) {
  ensureCustomPrograms();
  if (data.programs[type].length <= 1) return; // keep at least 1
  data.programs[type].splice(index, 1);
  save();
  renderBuild();
}

function moveExercise(type, index, direction) {
  ensureCustomPrograms();
  const arr = data.programs[type];
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= arr.length) return;
  [arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];
  // Update editing index if the edited one moved
  if (buildEditing && buildEditing.type === type && buildEditing.index === index) {
    buildEditing.index = newIndex;
  }
  save();
  renderBuild();
}

function resetPrograms() {
  data.programs = null;
  buildEditing = null;
  buildAdding = null;
  save();
  renderBuild();
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `iron-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.sessions && !imported.programs && !imported.weights) {
        alert('This doesn\'t look like an IRON backup file.');
        return;
      }
      if (!confirm('This will replace ALL your current data. Are you sure?')) return;
      Object.assign(data, imported);
      save();
      load();
      switchTab('build');
      renderBuild();
    } catch (err) {
      alert('Could not read backup file. Make sure it\'s a valid IRON export.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function shareData() {
  const json = JSON.stringify(data, null, 2);
  const date = new Date().toISOString().slice(0, 10);
  if (navigator.share) {
    const file = new File([json], `iron-backup-${date}.json`, { type: 'application/json' });
    navigator.share({ title: 'IRON Backup', files: [file] }).catch(() => {});
  } else {
    navigator.clipboard.writeText(json).then(() => {
      alert('Backup copied to clipboard. Paste it somewhere safe.');
    }).catch(() => {
      // Fallback: select from a textarea
      const ta = document.createElement('textarea');
      ta.value = json;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      alert('Backup copied to clipboard.');
    });
  }
}

/* ═══════════════════════════════════════════════
   CLOUD SYNC (JSONBin.io)
   ═══════════════════════════════════════════════ */
let syncInFlight = false;

function getSyncData() {
  // Strip sync metadata from the payload to avoid recursion
  const { syncApiKey, syncBinId, lastSyncTime, ...rest } = data;
  return rest;
}

async function setupSync() {
  const keyInput = document.getElementById('sync-api-key');
  const apiKey = keyInput?.value.trim();
  if (!apiKey) { alert('Please paste your JSONBin API key.'); return; }

  try {
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': apiKey,
        'X-Bin-Name': 'IRON Backup',
        'X-Bin-Private': 'true'
      },
      body: JSON.stringify(getSyncData())
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert('Could not connect: ' + (err.message || res.statusText));
      return;
    }
    const result = await res.json();
    data.syncApiKey = apiKey;
    data.syncBinId = result.metadata.id;
    data.lastSyncTime = Date.now();
    save();
    renderBuild();
  } catch (e) {
    alert('Connection failed. Check your API key and try again.');
  }
}

async function cloudPush() {
  if (!data.syncApiKey || !data.syncBinId || syncInFlight) return;
  syncInFlight = true;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${data.syncBinId}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': data.syncApiKey
      },
      body: JSON.stringify(getSyncData())
    });
    if (res.ok) {
      data.lastSyncTime = Date.now();
      save();
    }
  } catch (e) { /* silent fail */ }
  syncInFlight = false;
}

async function cloudPull() {
  if (!data.syncApiKey || !data.syncBinId) return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${data.syncBinId}/latest`, {
      headers: { 'X-Master-Key': data.syncApiKey }
    });
    if (!res.ok) { alert('Could not fetch from cloud.'); return; }
    const result = await res.json();
    const cloud = result.record;
    if (!cloud.sessions && !cloud.programs) { alert('Cloud data looks empty.'); return; }
    if (!confirm('Replace local data with cloud backup?')) return;
    const { syncApiKey, syncBinId } = data; // preserve sync credentials
    Object.assign(data, cloud, { syncApiKey, syncBinId, lastSyncTime: Date.now() });
    save();
    load();
    switchTab('build');
    renderBuild();
  } catch (e) {
    alert('Pull failed. Check your connection.');
  }
}

async function restoreFromCloud() {
  const keyInput = document.getElementById('sync-api-key');
  const binInput = document.getElementById('sync-bin-id');
  const apiKey = keyInput?.value.trim();
  const binId = binInput?.value.trim();
  if (!apiKey) { alert('Paste your Master Key in the first field.'); return; }
  if (!binId) { alert('Paste your Bin ID.'); return; }

  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
      headers: { 'X-Master-Key': apiKey }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert('Could not fetch: ' + (err.message || res.statusText));
      return;
    }
    const result = await res.json();
    const cloud = result.record;
    if (!cloud.sessions && !cloud.programs) {
      alert('Cloud data looks empty or invalid.');
      return;
    }
    if (!confirm('Replace all local data with cloud backup?')) return;
    Object.assign(data, cloud, { syncApiKey: apiKey, syncBinId: binId, lastSyncTime: Date.now() });
    save();
    load();
    switchTab('build');
    renderBuild();
  } catch (e) {
    alert('Restore failed. Check your key and Bin ID.');
  }
}

function disconnectSync() {
  if (!confirm('Disconnect cloud sync? Your cloud backup will remain on JSONBin but won\'t auto-update.')) return;
  delete data.syncApiKey;
  delete data.syncBinId;
  delete data.lastSyncTime;
  save();
  renderBuild();
}

// Auto-sync: debounced push after every save
let syncTimer = null;
const _origSave = save;
save = function() {
  _origSave();
  if (data.syncApiKey && data.syncBinId) {
    clearTimeout(syncTimer);
    syncTimer = setTimeout(cloudPush, 5000); // 5s debounce
  }
};

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
load();
renderTrainHome();

// Service Worker registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
