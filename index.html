      <button class="btn btn-primary" onclick="saveWorkout()">Save & Finish</button>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════
   PROGRAMS
   ═══════════════════════════════════════════════════════════ */
const PROGRAMS = {
  upper: [
    { name: 'Bench Press', sets: 4, reps: 8 },
    { name: 'Barbell Row', sets: 4, reps: 8 },
    { name: 'Overhead Press', sets: 3, reps: 10 },
    { name: 'Lat Pulldown', sets: 3, reps: 10 },
    { name: 'Dumbbell Curl', sets: 3, reps: 12 },
    { name: 'Tricep Dip', sets: 3, reps: 12 },
    { name: 'Face Pull', sets: 3, reps: 15 },
  ],
  lower: [
    { name: 'Back Squat', sets: 4, reps: 8 },
    { name: 'Romanian Deadlift', sets: 4, reps: 8 },
    { name: 'Leg Press', sets: 3, reps: 10 },
    { name: 'Walking Lunge', sets: 3, reps: 12 },
    { name: 'Leg Curl', sets: 3, reps: 12 },
    { name: 'Calf Raise', sets: 4, reps: 15 },
    { name: 'Hanging Leg Raise', sets: 3, reps: 12 },
  ]
};

const REST_DURATION = 90;
const CIRCUMFERENCE = 2 * Math.PI * 90; // 565.49
const KG_TO_LBS = 2.20462;

/* Strength standards: bodyweight multipliers for 1RM classification */
const STRENGTH_STANDARDS = {
  'Bench Press':        { beg: 0.5,  nov: 0.75, int: 1.25, adv: 1.5,  elite: 2.0 },
  'Incline Bench Press': { beg: 0.45, nov: 0.65, int: 1.1,  adv: 1.35, elite: 1.8 },
  'Back Squat':         { beg: 0.75, nov: 1.25, int: 1.75, adv: 2.25, elite: 3.0 },
  'Front Squat':        { beg: 0.6,  nov: 1.0,  int: 1.5,  adv: 1.9,  elite: 2.5 },
  'Romanian Deadlift':  { beg: 0.75, nov: 1.25, int: 1.75, adv: 2.25, elite: 3.0 },
  'Deadlift':           { beg: 1.0,  nov: 1.5,  int: 2.0,  adv: 2.75, elite: 3.5 },
  'Overhead Press':     { beg: 0.35, nov: 0.55, int: 0.8,  adv: 1.15, elite: 1.55 },
  'Barbell Row':        { beg: 0.5,  nov: 0.75, int: 1.25, adv: 1.5,  elite: 2.0 },
  'Leg Press':          { beg: 1.0,  nov: 1.5,  int: 2.5,  adv: 3.5,  elite: 4.5 },
};

const DIET_GOALS = {
  'cut-aggressive': { label: 'Aggressive Cut', target: [-0.75, -0.5], step: 200, desc: 'Lose 0.5–0.75 kg/week' },
  'cut':            { label: 'Cut',            target: [-0.5, -0.25], step: 150, desc: 'Lose 0.25–0.5 kg/week' },
  'recomp':         { label: 'Recomp',         target: [-0.1, 0.1],  step: 100, desc: 'Maintain weight ±0.1 kg/week' },
  'lean-bulk':      { label: 'Lean Bulk',      target: [0.1, 0.4],   step: 100, desc: 'Gain 0.1–0.4 kg/week' },
  'bulk':           { label: 'Bulk',           target: [0.4, 0.75],  step: 150, desc: 'Gain 0.4–0.75 kg/week' },
};

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
let data = {
  sessions: [],
  weights: [],
  nextType: 'upper',
  targetCalories: 2500,
  autoAdjust: true,
  dietGoal: 'lean-bulk', // 'cut-aggressive', 'cut', 'recomp', 'lean-bulk', 'bulk'
  programs: null,  // null = use defaults, otherwise { upper: [...], lower: [...] }
  weightUnit: 'kg',
  schedule: {
    trainingDays: [1, 3, 5], // 0=Sun..6=Sat
    pattern: ['upper', 'lower'],
    patternIndex: 0
  },
  deload: {
    mode: 'auto',
    programmedInterval: 4,
    lastDeloadDate: null,
    dismissedUntilSession: null
  },
  calorieRecommendation: null
};

let workout = null;   // active workout state
let timerInterval = null;
let currentTab = 'train';
let buildEditing = null; // { type, index } for exercise being edited
let buildAdding = null;  // 'upper'|'lower' when adding new exercise
let buildEditType = 'standard'; // current type selection in edit form
let historyPeriod = 'all'; // '1w', '1m', '3m', 'all'
let dietTrendPeriod = 7; // days: 7, 14, 30, 0 for all, or 'custom'
let dietCustomFrom = '';
let dietCustomTo = '';

function getPrograms() {
  const base = data.programs || { ...PROGRAMS };
  // Ensure all pattern types exist
  for (const type of data.schedule.pattern) {
    if (!base[type]) {
      base[type] = [{ name: 'Exercise 1', sets: 3, reps: 10 }];
    }
  }
  return base;
}

/* ═══════════════════════════════════════════════════════════
   PERSISTENCE
   ═══════════════════════════════════════════════════════════ */
function save() {
  localStorage.setItem('iron_data', JSON.stringify(data));
}

function load() {
  const saved = localStorage.getItem('iron_data');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      data = { ...data, ...parsed };
    } catch (e) { /* use defaults */ }
  }
  // Migration: schedule
  if (!data.schedule) {
    data.schedule = {
      trainingDays: [1, 3, 5],
      pattern: ['upper', 'lower'],
      patternIndex: data.nextType === 'upper' ? 0 : 1
    };
  }
  // Migration: deload
  if (!data.deload) {
    data.deload = { mode: 'auto', programmedInterval: 4, lastDeloadDate: null, dismissedUntilSession: null };
  }
  // Migration: weightUnit
  if (!data.weightUnit) data.weightUnit = 'kg';
  // Migration: dietGoal
  if (!data.dietGoal) data.dietGoal = 'lean-bulk';
  // Migration: calorieRecommendation
  if (data.calorieRecommendation === undefined) data.calorieRecommendation = null;
  // Keep nextType in sync
  data.nextType = data.schedule.pattern[data.schedule.patternIndex % data.schedule.pattern.length];

  // Check for interrupted workout
  const savedWorkout = localStorage.getItem('iron_workout');
  if (savedWorkout) {
    try {
      workout = JSON.parse(savedWorkout);
    } catch (e) { workout = null; }
  }
}

function saveWorkoutState() {
  if (workout) {
    localStorage.setItem('iron_workout', JSON.stringify(workout));
  } else {
    localStorage.removeItem('iron_workout');
  }
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════════════ */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  if (tab === 'train') renderTrainHome();
  if (tab === 'diet') renderDiet();
  if (tab === 'history') renderHistory();
  if (tab === 'build') renderBuild();
}

/* ═══════════════════════════════════════════════════════════
   UTILITY
   ═══════════════════════════════════════════════════════════ */
function today() {
  return new Date().toISOString().split('T')[0];
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatDuration(ms) {
  const mins = Math.floor(ms / 60000);
  return mins + ' min';
}

function daysAgo(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const now = new Date();
  now.setHours(12, 0, 0, 0);
  return Math.round((now - d) / (1000 * 60 * 60 * 24));
}

/* Normalize old set format (number) to new format (object) */
function normalizeSet(s) {
  if (s && typeof s === 'object' && !Array.isArray(s)) return s;
  if (Array.isArray(s)) return { reps: s, weight: null, skipped: false };
  return { reps: s, weight: null, skipped: false };
}

/* Get reps from a set (handles both old and new format) */
function getSetReps(s) {
  const ns = normalizeSet(s);
  return Array.isArray(ns.reps) ? ns.reps.reduce((a, b) => a + b, 0) : (ns.skipped ? 0 : ns.reps);
}

/* Get weight from a set */
function getSetWeight(s) {
  const ns = normalizeSet(s);
  return ns.weight;
}

/* Display weight in user's preferred unit */
function displayWeight(kg) {
  if (kg == null || kg === 0) return '';
  if (data.weightUnit === 'lbs') return Math.round(kg * KG_TO_LBS * 2) / 2;
  return Math.round(kg * 2) / 2;
}

function weightLabel() { return data.weightUnit; }

function parseWeightInput(val) {
  const n = parseFloat(val);
  if (isNaN(n) || n <= 0) return null;
  return data.weightUnit === 'lbs' ? n / KG_TO_LBS : n;
}

function weightIncrement() {
  return data.weightUnit === 'lbs' ? (5 / KG_TO_LBS) : 2.5; // 5lbs or 2.5kg
}

/* Look up last weight used for an exercise from session history */
function getLastWeight(exerciseName) {
  for (let i = data.sessions.length - 1; i >= 0; i--) {
    const ex = data.sessions[i].exercises.find(e => e.name === exerciseName);
    if (ex && ex.sets.length > 0) {
      const ns = normalizeSet(ex.sets[0]);
      if (ns.weight != null) return ns.weight;
    }
  }
  return null;
}

/* Determine if exercise is upper body (for progression increments) */
function isUpperExercise(name) {
  const lower = ['squat', 'deadlift', 'rdl', 'leg press', 'lunge', 'leg curl', 'leg extension', 'calf', 'hip thrust', 'glute'];
  return !lower.some(l => name.toLowerCase().includes(l));
}

/* Strength level classification */
function getStrengthLevel(exerciseName, liftWeight, bodyweight) {
  if (!liftWeight || !bodyweight) return null;
  const std = STRENGTH_STANDARDS[exerciseName];
  if (!std) return null;
  const ratio = liftWeight / bodyweight;
  if (ratio >= std.elite) return 'elite';
  if (ratio >= std.adv) return 'advanced';
  if (ratio >= std.int) return 'intermediate';
  if (ratio >= std.nov) return 'novice';
  return 'beginner';
}

/* Auto-progression recommendation */
function getProgressionRec(exerciseName, currentWeight, bodyweight) {
  const level = getStrengthLevel(exerciseName, currentWeight, bodyweight);
  const inc = isUpperExercise(exerciseName) ? 2.5 : 5; // kg
  if (!level || level === 'beginner' || level === 'novice') {
    return { suggestedWeight: currentWeight + inc, strategy: 'weight', badge: `+${displayWeight(inc)}` };
  }
  if (level === 'intermediate') {
    return { suggestedWeight: currentWeight, strategy: 'reps', badge: '+rep' };
  }
  return { suggestedWeight: currentWeight, strategy: 'periodize', badge: null };
}

/* Get current bodyweight (latest entry) */
function getCurrentBodyweight() {
  if (data.weights.length === 0) return null;
  return data.weights[data.weights.length - 1].weight;
}

/* Get next training day info */
function getNextTrainingDay() {
  const todayDow = new Date().getDay();
  const days = data.schedule.trainingDays;
  if (days.length === 0) return null;
  for (let i = 1; i <= 7; i++) {
    const check = (todayDow + i) % 7;
    if (days.includes(check)) {
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      return { day: check, name: dayNames[check], daysAway: i };
    }
  }
  return null;
}

/* Get label for a workout type from schedule pattern */
function getTypeLabel(type) {
  return type.charAt(0).toUpperCase() + type.slice(1).replace(/_/g, ' ');
}

/* Deload detection */
function shouldRecommendDeload() {
  if (data.deload.mode === 'off') return null;
  if (data.sessions.length < 4) return null;
  // Check if dismissed
  if (data.deload.dismissedUntilSession && data.sessions.length < data.deload.dismissedUntilSession) return null;

  const weeksSinceDeload = data.deload.lastDeloadDate ? Math.floor(daysAgo(data.deload.lastDeloadDate) / 7) : Math.floor(daysAgo(data.sessions[0].date) / 7);

  if (data.deload.mode === 'programmed') {
    if (weeksSinceDeload >= data.deload.programmedInterval) {
      return { recommend: true, reason: `${weeksSinceDeload} weeks since last deload` };
    }
    return null;
  }

  // Auto mode: check for signs of overtraining
  if (weeksSinceDeload >= 6) {
    return { recommend: true, reason: `${weeksSinceDeload} weeks without a deload` };
  }
  // Check for declining performance over last 3 sessions
  if (data.sessions.length >= 3) {
    const recent = data.sessions.slice(-3);
    let declines = 0;
    for (let i = 1; i < recent.length; i++) {
      const prev = recent[i-1].exercises.reduce((s, e) => s + e.sets.reduce((a, set) => a + getSetReps(set), 0), 0);
      const curr = recent[i].exercises.reduce((s, e) => s + e.sets.reduce((a, set) => a + getSetReps(set), 0), 0);
      if (curr < prev * 0.95) declines++;
    }
    if (declines >= 2) {
      return { recommend: true, reason: 'Performance declining over recent sessions' };
    }
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════
   TRAIN — HOME
   ═══════════════════════════════════════════════════════════ */
function getTrainState() {
  if (data.sessions.length === 0) return 'first-time';
  const last = data.sessions[data.sessions.length - 1];
  const ago = daysAgo(last.date);
  if (ago === 0) return 'rest-today';
  const todayDow = new Date().getDay();
  const isTrainingDay = data.schedule.trainingDays.includes(todayDow);
  if (ago === 1 && !isTrainingDay) return 'rest-recovery';
  if (!isTrainingDay) return 'rest-scheduled';
  return 'ready';
}

function buildSessionPreview(type) {
  const programs = getPrograms();
  const exercises = programs[type];
  if (!exercises || exercises.length === 0) return '';
  return `<div class="session-preview fade-in stagger-1">
    ${exercises.map(ex => {
      const wStr = ex.weight ? ` @ ${displayWeight(ex.weight)}` : '';
      return `<div class="session-preview-row">
        <span class="name">${ex.name}</span>
        <span class="info">${ex.sets} × ${ex.reps}${wStr}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function renderTrainHome() {
  const el = document.getElementById('train-content');
  const state = getTrainState();
  const nextLabel = getTypeLabel(data.nextType);
  const nextDay = getNextTrainingDay();
  const nextDayInfo = nextDay ? `${nextDay.name} — ${nextLabel}` : nextLabel;
  const previewHtml = buildSessionPreview(data.nextType);

  // Check for interrupted workout
  if (workout) {
    el.innerHTML = `
      <div class="card fade-in">
        <div class="rest-badge ready">Workout in progress</div>
        <div class="mt-16">
          <p class="text-sm text-dim">You have an unfinished workout. Resume or discard it.</p>
        </div>
        <div class="mt-16" style="display:flex;gap:8px">
          <button class="btn btn-primary" style="flex:1" onclick="resumeWorkout()">Resume</button>
          <button class="btn btn-danger" style="flex:1" onclick="discardWorkout()">Discard</button>
        </div>
      </div>`;
    return;
  }

  let deloadHtml = '';
  const deloadRec = shouldRecommendDeload();
  if (deloadRec && state !== 'first-time') {
    deloadHtml = `
      <div class="card deload-card fade-in" style="margin-bottom:12px;">
        <div class="deload-title">Consider a deload week</div>
        <p class="text-xs text-dim mt-8">${deloadRec.reason}</p>
        <div class="mt-12" style="display:flex;gap:8px">
          <button class="btn btn-secondary" style="flex:1;font-size:14px;padding:10px" onclick="startDeload()">Start Deload</button>
          <button class="btn btn-ghost" style="flex:1;font-size:14px;padding:10px" onclick="dismissDeload()">Dismiss</button>
        </div>
      </div>`;
  }

  let content = '';

  if (state === 'first-time') {
    content = `
      <div class="card fade-in" style="text-align:center;padding:40px 20px;">
        <div class="display display-lg" style="margin-bottom:8px;">Ready to<br>build?</div>
        <p class="text-sm text-dim mt-8">Set up your split in the Build tab,<br>then train when you're ready.</p>
        <div class="mt-24">
          <button class="btn btn-primary" onclick="showPreview()">Start Training</button>
        </div>
      </div>`;
  } else if (state === 'rest-today') {
    const last = data.sessions[data.sessions.length - 1];
    content = `
      ${deloadHtml}
      <div class="card fade-in">
        <div class="rest-badge rest">Rest Day</div>
        <div class="mt-16">
          <div class="display display-md">You crushed it today.</div>
          <p class="text-sm text-dim mt-8">${getTypeLabel(last.type)} session complete. Let your muscles recover.</p>
        </div>
      </div>
      <div class="next-session-type fade-in stagger-1">
        <span class="label">Next session</span>
        <div class="display display-sm mt-8">${nextDayInfo}</div>
      </div>
      ${previewHtml}
      <button class="btn btn-ghost mt-16 fade-in stagger-2" onclick="showPreview()">Ready to train anyway</button>`;
  } else if (state === 'rest-recovery') {
    content = `
      ${deloadHtml}
      <div class="card fade-in">
        <div class="rest-badge rest">Recovery Day</div>
        <div class="mt-16">
          <div class="display display-md">Your muscles<br>are growing.</div>
          <p class="text-sm text-dim mt-8">Yesterday's session is doing its work. Rest up.</p>
        </div>
      </div>
      <div class="next-session-type fade-in stagger-1">
        <span class="label">Next session</span>
        <div class="display display-sm mt-8">${nextDayInfo}</div>
      </div>
      ${previewHtml}
      <button class="btn btn-secondary mt-20 fade-in stagger-2" onclick="showPreview()">Ready to Train</button>`;
  } else if (state === 'rest-scheduled') {
    content = `
      ${deloadHtml}
      <div class="card fade-in">
        <div class="rest-badge rest">Scheduled Rest</div>
        <div class="mt-16">
          <div class="display display-md">Rest day.</div>
          <p class="text-sm text-dim mt-8">No training scheduled today.</p>
        </div>
      </div>
      <div class="next-session-type fade-in stagger-1">
        <span class="label">Next session</span>
        <div class="display display-sm mt-8">${nextDayInfo}</div>
      </div>
      ${previewHtml}
      <button class="btn btn-ghost mt-16 fade-in stagger-2" onclick="showPreview()">Ready to train anyway</button>`;
  } else {
    content = `
      ${deloadHtml}
      <div class="card fade-in" style="text-align:center;padding:32px 20px;">
        <div class="rest-badge ready" style="margin:0 auto;">Ready</div>
        <div class="mt-16">
          <div class="display display-lg">${nextLabel}</div>
          <p class="text-sm text-dim mt-8">${getPrograms()[data.nextType] ? getPrograms()[data.nextType].length : 0} exercises</p>
        </div>
        <div class="mt-24">
          <button class="btn btn-primary" onclick="showPreview()">Ready to Train</button>
        </div>
      </div>`;
  }

  el.innerHTML = content;
}

function startDeload() {
  data._isDeload = true;
  showPreview();
}

function dismissDeload() {
  data.deload.dismissedUntilSession = data.sessions.length + 1;
  save();
  renderTrainHome();
}

/* ═══════════════════════════════════════════════════════════
   TRAIN — PREVIEW
   ═══════════════════════════════════════════════════════════ */
function showPreview() {
  const el = document.getElementById('train-content');
  const type = data.nextType;
  const program = getPrograms()[type];
  const label = getTypeLabel(type);
  const totalSets = program.reduce((sum, ex) => sum + ex.sets, 0);
  const isDeload = !!data._isDeload;

  let exerciseList = program.map((ex, i) => {
    let w = ex.weight || getLastWeight(ex.name);
    if (isDeload && w) w = Math.round(w * 0.6 * 2) / 2;
    const weightStr = w ? ` @ ${displayWeight(w)}${weightLabel()}` : '';
    return `
    <div class="preview-exercise fade-in stagger-${Math.min(i + 1, 5)}">
      <span class="name">${ex.name}</span>
      <span class="detail">${ex.sets} × ${ex.reps}${weightStr}</span>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="fade-in" style="margin-bottom:8px;">
      <button class="btn-ghost" onclick="data._isDeload=false;renderTrainHome()" style="padding:0;font-size:14px;color:var(--text-3);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;">← Back</button>
    </div>
    ${isDeload ? '<div class="card deload-card fade-in" style="padding:12px 16px;margin-bottom:12px;"><div class="deload-title">Deload Session — weights reduced 40%</div></div>' : ''}
    <div class="card fade-in">
      <div class="display display-md" style="margin-bottom:4px;">${label}</div>
      <span class="text-sm text-dim">${program.length} exercises · ${totalSets} sets</span>
      <div class="divider"></div>
      ${exerciseList}
    </div>
    <div class="mt-12 fade-in stagger-4">
      <button class="btn btn-primary" onclick="startWorkout()">Start Session</button>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════
   TRAIN — ACTIVE WORKOUT
   ═══════════════════════════════════════════════════════════ */
function startWorkout() {
  const type = data.nextType;
  const program = getPrograms()[type];
  const bw = getCurrentBodyweight();
  const isDeload = !!data._isDeload;
  data._isDeload = false;

  workout = {
    type,
    isDeload,
    exercises: program.map(ex => {
      let w = ex.weight || getLastWeight(ex.name) || 0;
      let progressionBadge = null;
      let previousWeight = w;
      // Auto-progression: suggest weight increase if not deload
      if (w && !isDeload && !ex.isBodyweight && bw) {
        const rec = getProgressionRec(ex.name, w, bw);
        if (rec.suggestedWeight > w) {
          previousWeight = w;
          w = rec.suggestedWeight;
          progressionBadge = rec.badge;
        }
      }
      if (isDeload && w) w = Math.round(w * 0.6 * 2) / 2;
      return {
        name: ex.name,
        targetSets: ex.sets,
        targetReps: ex.reps,
        completedSets: [],
        currentReps: ex.reps,
        currentWeight: w,
        previousWeight,
        supersetNext: !!ex.supersetNext,
        restPause: !!ex.restPause,
        notes: ex.notes || '',
        isBodyweight: !!ex.isBodyweight,
        progressionBadge
      };
    }),
    currentExerciseIndex: 0,
    startTime: Date.now(),
    supersetPartnerPending: false,
    supersetStarterIndex: null,
    restPausePhase: 0,
    restPauseAccum: []
  };
  saveWorkoutState();
  showWorkoutScreen();
}

function resumeWorkout() {
  if (workout) showWorkoutScreen();
}

function discardWorkout() {
  workout = null;
  saveWorkoutState();
  renderTrainHome();
}

function showWorkoutScreen() {
  document.getElementById('workout-screen').classList.add('active');
  document.getElementById('nav').classList.add('hidden');
  renderExercise();
}

function hideWorkoutScreen() {
  document.getElementById('workout-screen').classList.remove('active');
  document.getElementById('nav').classList.remove('hidden');
}

function exitWorkout() {
  if (!workout) { hideWorkoutScreen(); return; }
  if (!confirm('Exit workout? Your progress so far will be saved and you can resume later.')) return;
  saveWorkoutState();
  hideWorkoutScreen();
  renderTrainHome();
}

function exerciseReady() {
  if (!workout) return;
  workout.exerciseReady = true;
  saveWorkoutState();
  renderExercise();
}

function renderExercise() {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  const currentSet = ex.completedSets.length + 1;
  const totalExercises = workout.exercises.length;

  // Progress pills
  const progressEl = document.getElementById('workout-progress');
  progressEl.innerHTML = workout.exercises.map((_, i) => {
    let cls = 'progress-pill';
    if (i < workout.currentExerciseIndex) cls += ' done';
    if (i === workout.currentExerciseIndex) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  // Type badge
  let typeBadge = '';
  let setLabel = `Set ${currentSet} of ${ex.targetSets}`;
  if (ex.supersetNext || workout.supersetPartnerPending) {
    const phase = workout.supersetPartnerPending ? '2/2' : '1/2';
    typeBadge = `<div class="workout-type-badge ss">Superset ${phase}</div>`;
  }
  if (ex.restPause) {
    typeBadge = `<div class="workout-type-badge rp">Rest-Pause</div>`;
    if (workout.restPausePhase === 1) {
      setLabel = `Set ${currentSet} of ${ex.targetSets} · Mini 1`;
    } else if (workout.restPausePhase === 2) {
      setLabel = `Set ${currentSet} of ${ex.targetSets} · Mini 2`;
    }
  }

  // Weight display (always show for non-bodyweight exercises)
  let weightHtml = '';
  if (!ex.isBodyweight) {
    const progBadge = ex.progressionBadge && currentSet === 1 && ex.completedSets.length === 0
      ? `<div class="progression-badge">▲ ${ex.progressionBadge} <span style="opacity:0.5;">was ${displayWeight(ex.previousWeight)}</span></div>` : '';
    weightHtml = `
      <div class="weight-adjuster">
        <button class="weight-adj-btn" onclick="adjustWeight(-1)">−</button>
        <div style="text-align:center">
          <div class="weight-display">${displayWeight(ex.currentWeight)}</div>
          <div class="weight-display-label">${weightLabel()}</div>
          ${progBadge}
        </div>
        <button class="weight-adj-btn" onclick="adjustWeight(1)">+</button>
      </div>`;
  }

  const bodyEl = document.getElementById('workout-body');
  const upnextEl = document.getElementById('workout-upnext');

  // ── PREP SCREEN: show before first set of a new exercise ──
  if (!workout.exerciseReady && currentSet === 1) {
    const prepNoteDisplay = ex.notes
      ? `<div class="prep-note">${ex.notes}</div>`
      : `<div class="prep-note empty" onclick="showWorkoutNoteInput()">+ add note</div>`;

    bodyEl.innerHTML = `
      ${typeBadge}
      <div class="exercise-label">Exercise ${workout.currentExerciseIndex + 1} of ${totalExercises}</div>
      <div class="exercise-name">${ex.name}</div>
      ${weightHtml}
      ${prepNoteDisplay}
      <button class="done-btn" onclick="exerciseReady()" style="margin-top:32px;">Let's Go</button>
      <button class="skip-btn mt-8" onclick="workout.exerciseReady=true;skipExercise()" style="margin-top:12px;">Skip Exercise</button>
    `;
    upnextEl.style.display = 'none';
    return;
  }

  // ── TRACKING SCREEN: log sets ──
  // Notes (editable)
  const notesHtml = ex.notes
    ? `<textarea class="exercise-note-edit" rows="2" onblur="updateWorkoutNote(this.value)" onfocus="this.style.borderColor='var(--accent)'">${ex.notes}</textarea>`
    : `<div class="exercise-note-add" onclick="showWorkoutNoteInput()">+ add note</div>`;

  bodyEl.innerHTML = `
    ${typeBadge}
    <div class="exercise-label">Exercise ${workout.currentExerciseIndex + 1} of ${totalExercises}</div>
    <div class="exercise-name">${ex.name}</div>
    ${notesHtml}
    ${weightHtml}
    <div class="set-indicator">${setLabel}</div>
    <div class="rep-adjuster">
      <button class="rep-btn" onclick="adjustReps(-1)">−</button>
      <div style="text-align:center">
        <div class="rep-count">${ex.currentReps}</div>
        <div class="rep-label">reps</div>
      </div>
      <button class="rep-btn" onclick="adjustReps(1)">+</button>
    </div>
    <button class="done-btn" onclick="completeSet(this)">Done</button>
    <div class="workout-actions">
      <button class="skip-btn" onclick="skipSet()">Skip Set</button>
      <button class="add-set-btn" onclick="addSetDuringWorkout()">+ Set</button>
    </div>
  `;

  // Up next
  const remaining = workout.exercises.slice(workout.currentExerciseIndex + 1, workout.currentExerciseIndex + 3);
  if (remaining.length > 0) {
    upnextEl.innerHTML = `
      <div class="up-next-label">Up next</div>
      ${remaining.map(e => {
        const wStr = e.currentWeight ? ` @ ${displayWeight(e.currentWeight)}` : '';
        return `
        <div class="up-next-item">
          <span class="name">${e.name}</span>
          <span class="info">${e.targetSets} × ${e.targetReps}${wStr}</span>
        </div>`;
      }).join('')}
    `;
    upnextEl.style.display = '';
  } else {
    upnextEl.innerHTML = `<div class="up-next-label" style="text-align:center;color:var(--accent);">Final exercise</div>`;
  }
}

function adjustWeight(delta) {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  const inc = weightIncrement();
  ex.currentWeight = Math.max(0, ex.currentWeight + delta * inc);
  ex.progressionBadge = null; // clear badge once manually adjusted
  saveWorkoutState();
  const el = document.querySelector('.weight-display');
  if (el) el.textContent = displayWeight(ex.currentWeight);
}

function updateWorkoutNote(val) {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  ex.notes = val.trim();
  // Also save to the program definition
  const programs = getPrograms();
  const prog = programs[workout.type];
  if (prog) {
    const match = prog.find(e => e.name === ex.name);
    if (match) { match.notes = ex.notes; save(); }
  }
  saveWorkoutState();
}

function showWorkoutNoteInput() {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  // Replace the "+ add note" element with a textarea
  const addEl = document.querySelector('.exercise-note-add');
  if (addEl) {
    const ta = document.createElement('textarea');
    ta.className = 'exercise-note-edit';
    ta.rows = 1;
    ta.placeholder = 'e.g., pause at bottom, narrow grip';
    ta.onblur = function() {
      if (this.value.trim()) {
        updateWorkoutNote(this.value);
      } else {
        renderExercise(); // revert to "+ add note"
      }
    };
    addEl.replaceWith(ta);
    ta.focus();
  }
}

function addSetDuringWorkout() {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  ex.targetSets++;
  saveWorkoutState();
  // Update the set indicator display
  const setEl = document.querySelector('.set-indicator');
  if (setEl) setEl.textContent = `Set ${ex.completedSets.length + 1} of ${ex.targetSets}`;
}

function skipExercise() {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  // Skip all remaining sets
  while (ex.completedSets.length < ex.targetSets) {
    ex.completedSets.push({ reps: 0, weight: ex.currentWeight, skipped: true });
  }
  if (workout.currentExerciseIndex + 1 >= workout.exercises.length) {
    saveWorkoutState(); showDoneScreen();
  } else {
    workout.currentExerciseIndex++;
    workout.exerciseReady = false;
    saveWorkoutState(); renderExercise();
  }
}

function skipSet() {
  if (!workout) return;
  // Dismiss any active rest timer
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  const timerEl = document.getElementById('timer-screen');
  if (timerEl) timerEl.classList.remove('active');
  const ex = workout.exercises[workout.currentExerciseIndex];

  // Log skipped set
  ex.completedSets.push({ reps: 0, weight: ex.currentWeight, skipped: true });

  // Reset rest-pause state if active
  if (ex.restPause) {
    workout.restPausePhase = 0;
    workout.restPauseAccum = [];
  }

  // Follow standard advancement logic
  if (workout.supersetPartnerPending) {
    workout.supersetPartnerPending = false;
    const starterIdx = workout.supersetStarterIndex;
    const starter = workout.exercises[starterIdx];
    if (starter.completedSets.length >= starter.targetSets && ex.completedSets.length >= ex.targetSets) {
      const nextIdx = starterIdx + 2;
      if (nextIdx >= workout.exercises.length) { saveWorkoutState(); showDoneScreen(); return; }
      workout.currentExerciseIndex = nextIdx;
    } else {
      workout.currentExerciseIndex = starter.completedSets.length >= starter.targetSets ? starterIdx + 1 : starterIdx;
    }
    saveWorkoutState();
    renderExercise();
    return;
  }

  const isLastSet = ex.completedSets.length >= ex.targetSets;
  const isLastExercise = workout.currentExerciseIndex >= workout.exercises.length - 1;

  if (isLastSet && isLastExercise) {
    saveWorkoutState(); showDoneScreen();
  } else if (isLastSet) {
    workout.currentExerciseIndex++;
    workout.exerciseReady = false;
    saveWorkoutState(); renderExercise();
  } else {
    saveWorkoutState(); renderExercise();
  }
}

function adjustReps(delta) {
  if (!workout) return;
  const ex = workout.exercises[workout.currentExerciseIndex];
  ex.currentReps = Math.max(1, ex.currentReps + delta);
  saveWorkoutState();
  const repCountEl = document.querySelector('.rep-count');
  if (repCountEl) repCountEl.textContent = ex.currentReps;
}

function completeSet(btnEl) {
  if (!workout) return;

  // Ripple effect
  if (btnEl) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = '120px';
    ripple.style.left = '0px';
    ripple.style.top = '0px';
    btnEl.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
  }

  const ex = workout.exercises[workout.currentExerciseIndex];

  // ── REST-PAUSE: intermediate phases (short rest, don't log set yet) ──
  if (ex.restPause && workout.restPausePhase < 2) {
    if (workout.restPausePhase === 0) {
      workout.restPauseAccum = [ex.currentReps];
      workout.restPausePhase = 1;
      ex.currentReps = Math.max(1, Math.ceil(ex.targetReps * 0.5));
    } else {
      workout.restPauseAccum.push(ex.currentReps);
      workout.restPausePhase = 2;
      ex.currentReps = Math.max(1, Math.ceil(ex.targetReps * 0.3));
    }
    saveWorkoutState();
    setTimeout(() => startRestTimer(() => renderExercise(), 5), 300);
    return;
  }

  // ── LOG THE SET ──
  if (ex.restPause) {
    workout.restPauseAccum.push(ex.currentReps);
    ex.completedSets.push({ reps: [...workout.restPauseAccum], weight: ex.currentWeight, skipped: false });
    workout.restPausePhase = 0;
    workout.restPauseAccum = [];
    ex.currentReps = ex.targetReps;
  } else {
    ex.completedSets.push({ reps: ex.currentReps, weight: ex.currentWeight, skipped: false });
  }

  // ── SUPERSET FIRST EXERCISE: go to partner (no rest) ──
  if (ex.supersetNext && !workout.supersetPartnerPending &&
      workout.currentExerciseIndex + 1 < workout.exercises.length) {
    workout.supersetPartnerPending = true;
    workout.supersetStarterIndex = workout.currentExerciseIndex;
    workout.currentExerciseIndex++;
    workout.exerciseReady = false;
    saveWorkoutState();
    setTimeout(() => renderExercise(), 300);
    return;
  }

  // ── SUPERSET PARTNER: return to starter or advance ──
  if (workout.supersetPartnerPending) {
    workout.supersetPartnerPending = false;
    const starterIdx = workout.supersetStarterIndex;
    const starter = workout.exercises[starterIdx];
    const starterDone = starter.completedSets.length >= starter.targetSets;
    const partnerDone = ex.completedSets.length >= ex.targetSets;

    if (starterDone && partnerDone) {
      const nextIdx = starterIdx + 2;
      if (nextIdx >= workout.exercises.length) {
        saveWorkoutState();
        setTimeout(() => showDoneScreen(), 300);
        return;
      }
      workout.currentExerciseIndex = nextIdx;
    } else {
      workout.currentExerciseIndex = starterDone ? starterIdx + 1 : starterIdx;
    }
    saveWorkoutState();
    setTimeout(() => startRestTimer(() => renderExercise()), 300);
    return;
  }

  // ── STANDARD FLOW ──
  const isLastSet = ex.completedSets.length >= ex.targetSets;
  const isLastExercise = workout.currentExerciseIndex >= workout.exercises.length - 1;

  if (isLastSet && isLastExercise) {
    saveWorkoutState();
    setTimeout(() => showDoneScreen(), 300);
  } else if (isLastSet) {
    workout.currentExerciseIndex++;
    workout.exerciseReady = false;
    saveWorkoutState();
    setTimeout(() => startRestTimer(() => renderExercise()), 300);
  } else {
    saveWorkoutState();
    setTimeout(() => startRestTimer(() => renderExercise()), 300);
  }
}

/* ═══════════════════════════════════════════════════════════
   REST TIMER
   ═══════════════════════════════════════════════════════════ */
function startRestTimer(onComplete, duration) {
  const restDuration = duration || REST_DURATION;
  window._timerCallback = onComplete;
  const timerScreen = document.getElementById('timer-screen');
  const arc = document.getElementById('timer-arc');
  const secondsEl = document.getElementById('timer-seconds');
  const contextEl = document.getElementById('timer-context');

  // Show what's next
  if (workout) {
    const ex = workout.exercises[workout.currentExerciseIndex];
    const currentSet = ex.completedSets.length + 1;
    const isLastSet = ex.completedSets.length >= ex.targetSets;

    if (ex.restPause && workout.restPausePhase > 0) {
      const miniLabel = workout.restPausePhase === 1 ? 'Mini set 1' : 'Mini set 2';
      contextEl.innerHTML = `
        <div class="timer-next-label">Rest-Pause</div>
        <div class="timer-next-exercise">${miniLabel}</div>
      `;
    } else if (workout.supersetPartnerPending) {
      contextEl.innerHTML = `
        <div class="timer-next-label">Superset · back to</div>
        <div class="timer-next-exercise">${workout.exercises[workout.supersetStarterIndex].name}</div>
      `;
    } else if (isLastSet && workout.currentExerciseIndex < workout.exercises.length - 1) {
      const nextEx = workout.exercises[workout.currentExerciseIndex + 1];
      contextEl.innerHTML = `
        <div class="timer-next-label">Next exercise</div>
        <div class="timer-next-exercise">${nextEx.name}</div>
      `;
    } else {
      contextEl.innerHTML = `
        <div class="timer-next-label">Next up</div>
        <div class="timer-next-exercise">${ex.name} · Set ${currentSet}</div>
      `;
    }
  }

  timerScreen.classList.add('active');
  arc.style.strokeDashoffset = '0';
  secondsEl.textContent = restDuration;

  const endTime = Date.now() + restDuration * 1000;

  timerInterval = setInterval(() => {
    const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
    secondsEl.textContent = remaining;
    const progress = 1 - remaining / restDuration;
    arc.style.strokeDashoffset = (progress * CIRCUMFERENCE).toFixed(1);

    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      timerScreen.classList.remove('active');
      if (window._timerCallback) window._timerCallback();
    }
  }, 100);
}

function skipRest() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
  document.getElementById('timer-screen').classList.remove('active');
  if (window._timerCallback) window._timerCallback();
}

/* ═══════════════════════════════════════════════════════════
   DONE SCREEN
   ═══════════════════════════════════════════════════════════ */
function showDoneScreen() {
  hideWorkoutScreen();
  const doneScreen = document.getElementById('done-screen');
  const bodyEl = document.getElementById('done-body');
  const duration = Date.now() - workout.startTime;
  const totalSets = workout.exercises.reduce((s, e) => s + e.completedSets.filter(set => !normalizeSet(set).skipped).length, 0);
  const typeLabel = getTypeLabel(workout.type);

  let exerciseSummary = workout.exercises.map((ex, i) => {
    let setsDisplay = ex.completedSets.map(s => {
      const ns = normalizeSet(s);
      if (ns.skipped) return '<span style="color:var(--text-3)">SKIP</span>';
      if (Array.isArray(ns.reps)) return ns.reps.join('+');
      return ns.reps;
    }).join(', ');
    // Show weight
    const w = ex.currentWeight;
    const weightStr = w ? ` @ ${displayWeight(w)}${weightLabel()}` : '';
    const badge = ex.restPause ? ' <span class="type-badge rp">RP</span>' : (ex.supersetNext ? ' <span class="type-badge ss">SS</span>' : '');
    return `
      <div class="done-exercise-row fade-in" style="animation-delay:${0.3 + i * 0.05}s">
        <span class="done-exercise-name">${ex.name}${badge}</span>
        <span class="done-exercise-sets">${setsDisplay}${weightStr}</span>
      </div>`;
  }).join('');

  bodyEl.innerHTML = `
    <div class="stat-row mb-16 fade-in stagger-1">
      <div class="stat-box">
        <div class="stat-value">${typeLabel.split(' ')[0]}</div>
        <div class="stat-label">Session</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${formatDuration(duration)}</div>
        <div class="stat-label">Duration</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${totalSets}</div>
        <div class="stat-label">Sets</div>
      </div>
    </div>
    <div class="card fade-in stagger-2">
      <span class="label">Exercises</span>
      <div class="mt-12">
        ${exerciseSummary}
      </div>
    </div>
  `;

  doneScreen.classList.add('active');
}

function saveWorkout() {
  if (!workout) return;
  const session = {
    id: 'ses_' + Date.now(),
    date: today(),
    type: workout.type,
    isDeload: !!workout.isDeload,
    exercises: workout.exercises.map(ex => ({
      name: ex.name,
      targetSets: ex.targetSets,
      targetReps: ex.targetReps,
      sets: [...ex.completedSets]
    })),
    duration: Date.now() - workout.startTime,
    startTime: workout.startTime
  };

  data.sessions.push(session);

  // Advance schedule pattern
  data.schedule.patternIndex = (data.schedule.patternIndex + 1) % data.schedule.pattern.length;
  data.nextType = data.schedule.pattern[data.schedule.patternIndex];

  // Deload tracking
  if (workout.isDeload) {
    data.deload.lastDeloadDate = today();
    data.deload.dismissedUntilSession = null;
  }

  save();

  workout = null;
  saveWorkoutState();

  document.getElementById('done-screen').classList.remove('active');
  renderTrainHome();
}

/* ═══════════════════════════════════════════════════════════

function renderDiet() {
  const el = document.getElementById('diet-content');
  const proteinGrams = Math.round((data.targetCalories * 0.30) / 4);
  const todayWeight = data.weights.find(w => w.date === today());
  const lastWeight = data.weights.length > 0 ? data.weights[data.weights.length - 1] : null;
  const trend = calculateTrend();

  const periodLabel = dietTrendPeriod === 'custom'
    ? (dietCustomFrom && dietCustomTo ? `${formatDate(dietCustomFrom)} – ${formatDate(dietCustomTo)}` : 'Custom Range')
    : dietTrendPeriod === 0 ? 'All Time' : `${dietTrendPeriod}-Day`;
  const periodBtns = `
    <div class="trend-period mt-8">
      ${[7, 14, 30, 0].map(d => `<button class="trend-period-btn ${dietTrendPeriod === d ? 'active' : ''}" onclick="setDietTrendPeriod(${d})">${d === 0 ? 'All' : d + 'D'}</button>`).join('')}
      <button class="trend-period-btn ${dietTrendPeriod === 'custom' ? 'active' : ''}" onclick="setDietTrendPeriod('custom')">Custom</button>
    </div>
    ${dietTrendPeriod === 'custom' ? `
      <div class="custom-date-range">
        <input type="date" id="trend-from" class="date-input" value="${dietCustomFrom}" max="${today()}">
        <span class="date-range-sep">to</span>

  let trendHtml = '';
  if (trend) {
    const rateStr = (trend.weeklyRate >= 0 ? '+' : '') + trend.weeklyRate.toFixed(2);
    const graphHtml = buildWeightGraph(trend.points);
    trendHtml = `
      <div class="card fade-in stagger-3">
        <span class="label">Weight Trend</span>
        ${periodBtns}
        <div class="trend-card ${trend.status}">
          <div class="trend-rate">${rateStr} kg/week</div>
          <div class="trend-label-text ${trend.status}">${trend.label}</div>
          <div class="trend-detail">${trend.from.toFixed(1)} → ${trend.to.toFixed(1)} kg over ${Math.round(trend.days)} days</div>
        </div>
        ${graphHtml}
        ${trend.adjustment ? `<p class="text-xs text-dim mt-8">Auto-adjusted: ${trend.adjustment}</p>` : ''}
      </div>`;
  } else if (data.weights.length > 0) {
    trendHtml = `
      <div class="card fade-in stagger-3">
        <span class="label">Weight Trend</span>
        ${periodBtns}
        <p class="text-sm text-dim mt-12">${dietTrendPeriod === 'custom' && (!dietCustomFrom || !dietCustomTo) ? 'Select a date range above.' : 'Keep logging daily — need more data for trend analysis.'}</p>
      </div>`;
  }

  let weightLogHtml = '';
  if (data.weights.length > 0) {
    const recent = [...data.weights].reverse().slice(0, 10);
    weightLogHtml = `
      <div class="card fade-in stagger-4">
        <span class="label">Weight Log</span>
        <div class="mt-12">
          ${recent.map(w => `
            <div class="weight-log-entry">
              <span class="date">${formatDate(w.date)}</span>
              <span class="weight">${displayWeight(w.weight)} ${weightLabel()}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // Recommendation card
  let recHtml = '';
  if (data.calorieRecommendation && data.autoAdjust) {
    const rec = data.calorieRecommendation;
    recHtml = `
      <div class="card fade-in stagger-2" style="margin-top:-4px;">
        <span class="label">Calorie Recommendation</span>
        <div class="trend-card ${rec.status} mt-8">
          <div class="rec-text">${rec.text}</div>
          ${rec.adjustment ? `<div class="rec-adjustment">${rec.adjustment}</div>` : ''}
          <div class="rec-meta">${rec.usedLongTrend ? '14-day analysis' : '7-day analysis'} · ${formatDate(rec.date)}</div>
        </div>
      </div>`;
  }

  el.innerHTML = `
    <div class="target-display fade-in">
      <div class="target-box cal">
        <div class="value">${data.targetCalories.toLocaleString()}</div>
        <div class="unit">Calories</div>
      </div>
      <div class="target-box">
        <div class="value">${proteinGrams}</div>
        <div class="unit">Protein (g)</div>
      </div>
    </div>

    <div class="card fade-in stagger-1">
      <span class="label">Log Today's Weight</span>
      <div class="weight-input-row mt-12">
        <input type="number" id="weight-input" inputmode="decimal" step="0.1" placeholder="${todayWeight ? todayWeight.weight : (lastWeight ? lastWeight.weight : '80.0')}" value="${todayWeight ? todayWeight.weight : ''}">
        <button onclick="logWeight()">${todayWeight ? 'Update' : 'Log'}</button>
      </div>
      ${lastWeight && !todayWeight ? `<p class="text-xs text-dim mt-8">Last: ${lastWeight.weight} kg on ${formatDate(lastWeight.date)}</p>` : ''}
      ${todayWeight ? `<p class="text-xs text-dim mt-8">Logged today: ${todayWeight.weight} kg</p>` : ''}

      </div>
      <div class="diet-goal-desc">${(DIET_GOALS[data.dietGoal] || DIET_GOALS['lean-bulk']).desc}</div>
      <div class="divider"></div>
      <div class="toggle-row">
        <span class="toggle-label">Auto-adjust calories</span>
        <button class="toggle ${data.autoAdjust ? 'on' : ''}" onclick="toggleAutoAdjust()"></button>
      </div>
      <p class="text-xs text-dim">Analyses your weight trend and proportionally adjusts calories to keep you in the ${(DIET_GOALS[data.dietGoal] || DIET_GOALS['lean-bulk']).label.toLowerCase()} range. Uses 14-day trend when available.</p>

        <div class="divider"></div>

        <div class="calorie-override mt-8">
